briefs:

  - date: 2025-07-24
    title: New example - Equality comparison
    description: 'We have published a new commented example: [Equality Comparison](https://doc.metalama.net/examples/comparison).'

  - date: 2025-07-23
    title: Metalama 2025.1.11 released - Bug fixes
    description: We've released Metalama 2025.1.11 fixing a few bugs. See the [GitHub release](https://github.com/metalama/Metalama/releases/tag/release%2F2025.1.11).

  - date: 2025-07-03
    title: Metalama 2025.1.10 released - VSX fixes
    description: We've released Metalama 2025.1.10 fixing a few bugs in our Visual Studio Extension. See the [GitHub release](https://github.com/metalama/Metalama/releases/tag/release%2F2025.1.10).

  - date: 2025-05-29
    title: Metalama 2025.1.9 released - critical VSX bug fix
    description: We've released Metalama 2025.1.9 with a critical bug fix in our Visual Studio Extension. See the [GitHub release](https://github.com/metalama/Metalama/releases/tag/release%2F2025.1.9).

  - date: 2025-05-26
    title: Metalama 2025.1.8 released - critical bug fix
    description: We've released Metalama 2025.1.8 with a critical bug fix and more minor improvements. See the [GitHub release](https://github.com/metalama/Metalama/releases/tag/release%2F2025.1.8).

  - date: 2025-05-22
    title: Metalama 2025.1.7 released, merging Roslyn 4.14
    description: We've released Metalama 2025.1.7, with minor improvements and merge of Roslyn 4.14. See the [GitHub release](https://github.com/metalama/Metalama/releases/tag/release%2F2025.1.7).

  - date: 2025-05-15
    title: Metalama 2025.1.6 released
    description: We've released Metalama 2025.1.6, with minor improvements and important bug fixes. See the [CHANGELOG](https://github.com/orgs/metalama/discussions/437).

  - date: 2025-05-14
    title: Metalama now has the OpenSSF Best Practices Badge.
    description: |
      Metalama has earned the OpenSSF Best Practices Badge, demonstrating adherence to key open-source security and quality standards.
      For a detailed breakdown of the criteria met, visit our [badge page](https://www.bestpractices.dev/en/projects/10558).

  - date: 2025-05-12
    title: We're now publishing brief updates.
    description: |
      As we are closing our Slack workspace, we will publish briefs (typically announcing builds) on this website instead. We'll keep
      briefs separate from long-form articles published on our blog. You can subscribe to briefs using RSS or JSON Feed from 
      [this page](https://metalama.net/briefs).
